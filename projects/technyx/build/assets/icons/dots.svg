<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" width="1200" height="800" aria-hidden="true">
  <defs>
    <!-- linear gradient leftwards (from blue-500 to teal-400) -->
    <linearGradient id="grad-left" x1="100%" x2="0%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>   <!-- tailwind blue-500 -->
      <stop offset="100%" stop-color="#2DD4BF"/> <!-- tailwind teal-400 -->
    </linearGradient>

    <!-- small repeating dot pattern -->
    <pattern id="dotPattern" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <!-- the dot uses the gradient fill so its color follows the linear gradient -->
      <circle cx="16" cy="16" r="6" fill="url(#grad-left)"/>
    </pattern>

    <!-- radial mask to fade dots out toward edges -->
    <radialGradient id="fadeMask" cx="50%" cy="45%" r="60%">
      <!-- center opaque, edges transparent -->
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="90%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="radialMask">
      <!-- mask uses the radial gradient as alpha: white = visible, black/transparent = hidden -->
      <rect x="0" y="0" width="1200" height="800" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <!-- background base (optional, behind dots) -->
  <rect width="1200" height="800" fill="#0B0B0B"/>

  <!-- dots layer (pattern) — masked by radial mask so it looks radial -->
  <rect width="1200" height="800" fill="url(#dotPattern)" mask="url(#radialMask)"/>

  <!-- optional: subtle large circles to emulate expanding halftone rings (edit or remove) -->
  <g fill="none" opacity="0.06" stroke="url(#grad-left)" stroke-width="60">
    <circle cx="800" cy="380" r="260" />
    <circle cx="800" cy="380" r="420" />
  </g>
</svg>
